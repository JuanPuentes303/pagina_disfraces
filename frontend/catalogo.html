<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Catálogo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<nav class="navbar navbar-expand-lg bg-body-tertiary">
  <div class="container-fluid">

    <a class="navbar-brand" href="#">Disfraces Rivera</a>

    <div class="collapse navbar-collapse">

        <div class="me-auto">
            <select id="categoria" onchange="filtrarCategoria()" class="form-select">
                <option value="">Todas</option>
                <option value="Superhéroe">Superhéroe</option>
                <option value="Terror">Terror</option>
                <option value="Infantil">Infantil</option>
            </select>
        </div>

        <form class="d-flex" onsubmit="return false;">
            <input class="form-control me-2" type="search" placeholder="Buscar disfraz..." id="buscador">
            <button class="btn btn-outline-success" type="button" onclick="buscar()">Buscar</button>
        </form>

    </div>
  </div>
</nav>

<div class="container mt-4">

    <h1>Catálogo de Disfraces</h1>

    <p id="usuario" class="fw-bold"></p> 

    <h2>Resultados</h2>
    <div id="catalogo" class="row"></div>

    <h2 class="mt-4">Relacionados</h2>
    <div id="relacionados" class="row"></div>
    <button onclick="logout()" class="btn btn-danger mb-3">Cerrar sesión</button>
</div>

<script src="js/catalogo.js"></script>

</body>
</html>
