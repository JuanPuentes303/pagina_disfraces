<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Catálogo</title>
</head>
<body>
    <h1>Bienvenido al catálogo</h1>
    <p id="usuario"></p>

    <script>
        const usuario = JSON.parse(localStorage.getItem("usuarioLogueado"));
        document.getElementById("usuario").innerText =
            "Hola, " + usuario.nombre;
    </script>
</body>
</html>
