<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Catálogo</title>
</head>
<script>
const usuario = localStorage.getItem("usuarioLogueado");

if (!usuario) {
    window.location.href = "login.html";
}
</script>
<body>

<h1>Catálogo de Disfraces</h1>

<input type="text" id="buscador" placeholder="Buscar disfraz...">
<button onclick="buscar()">Buscar</button>

<select id="categoria" onchange="filtrarCategoria()">
    <option value="">Todas</option>
    <option value="Superhéroe">Superhéroe</option>
    <option value="Terror">Terror</option>
    <option value="Infantil">Infantil</option>
</select>

<h2>Resultados</h2>
<div id="catalogo"></div>

<h2>Relacionados</h2>
<div id="relacionados"></div>

<p id="usuario"></p>
<button onclick="logout()">Cerrar sesión</button>

<script>
const u = JSON.parse(localStorage.getItem("usuarioLogueado"));
document.getElementById("usuario").innerText = "Hola, " + u.nombre;

function logout() {
    localStorage.removeItem("usuarioLogueado");
    window.location.href = "login.html";
}
</script>

<script src="js/catalogo.js"></script>

</body>
</html>
